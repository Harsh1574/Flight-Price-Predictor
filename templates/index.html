<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Price Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="dashboard-card">
        <div class="header">
            <h1>Flight Price AI</h1>
            <p>Enter trip details to get an instant ML-powered price estimate</p>
        </div>

        <form action="/predict" method="post" class="form-grid">
            <div class="form-group">
                <label>Departure Date & Time</label>
                <input type="datetime-local" name="Dep_Time" required>
            </div>

            <div class="form-group">
                <label>Arrival Date & Time</label>
                <input type="datetime-local" name="Arrival_Time" required>
            </div>

            <div class="form-group">
                <label>Source City</label>
                <select name="Source" required>
                    <option value="Delhi">Delhi</option>
                    <option value="Kolkata">Kolkata</option>
                    <option value="Mumbai">Mumbai</option>
                    <option value="Chennai">Chennai</option>
                </select>
            </div>

            <div class="form-group">
                <label>Destination City</label>
                <select name="Destination" required>
                    <option value="Cochin">Cochin</option>
                    <option value="Banglore">Banglore</option>
                    <option value="Hyderabad">Hyderabad</option>
                    <option value="Delhi">Delhi</option>
                </select>
            </div>

            <div class="form-group full-width">
                <label>Airline Preference</label>
                <select name="airline" required>
                    <option value="IndiGo">IndiGo</option>
                    <option value="Air India">Air India</option>
                    <option value="Jet Airways">Jet Airways</option>
                    <option value="SpiceJet">SpiceJet</option>
                </select>
            </div>

            <div class="form-group full-width">
                <label>Number of Stops</label>
                <select name="stops" required>
                    <option value="0">Non-stop (Direct)</option>
                    <option value="1">1 Stop</option>
                    <option value="2">2+ Stops</option>
                </select>
            </div>

            <button type="submit" class="btn-predict">Calculate Estimate</button>
        </form>

        {% if prediction_text %}
        <div class="result-container">
            <h2>{{ prediction_text }}</h2>
        </div>
        {% endif %}
    </div>
</body>
</html>
